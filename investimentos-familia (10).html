<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --amber: #f59e0b;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overscroll-behavior: none;
}
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.topbar {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.topbar-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.content { flex: 1; padding: 16px 20px 100px; overflow-y: auto; }
.nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 4px;
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  transition: color .15s;
  font-family: var(--font);
}
.nav-btn.active { color: var(--text); }
.nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
.nav-btn span { font-size: 10px; font-weight: 500; }
.section { display: none; }
.section.active { display: block; }

/* Cards */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.card-value { font-size: 28px; font-weight: 600; letter-spacing: -1px; font-family: var(--mono); }
.card-sub { font-size: 12px; margin-top: 4px; color: var(--text2); }

/* Metric grid */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
.metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.metric-value { font-size: 18px; font-weight: 600; font-family: var(--mono); letter-spacing: -0.5px; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

.positive { color: var(--green); }
.negative { color: var(--red); }
.neutral { color: var(--text2); }

/* Progress bar */
.progress-wrap { margin-bottom: 12px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-title { font-size: 13px; font-weight: 500; }
.progress-pct { font-size: 12px; color: var(--text2); font-family: var(--mono); }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 100px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--green); border-radius: 100px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.progress-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* Charts */
.chart-container { position: relative; width: 100%; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* Section headers */
.section-header { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin: 20px 0 10px; }

/* Forms */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.form-input, .form-select {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--border2);
}
.form-input::placeholder { color: var(--text3); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text);
  transition: all .15s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--text);
  color: var(--bg);
  border-color: transparent;
}
.btn-danger { color: var(--red); border-color: rgba(239,68,68,0.2); }
.btn-danger:active { background: var(--red-dim); }
.btn-full { width: 100%; justify-content: center; }
.btn-sm { padding: 7px 12px; font-size: 13px; }

/* Table */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }

/* Pills */
.pill { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; }
.pill-eu { background: var(--green-dim); color: var(--green); }
.pill-esposa { background: var(--purple-dim); color: var(--purple); }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: var(--bg3); color: var(--text2); }

/* Empty */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }
.empty svg { margin: 0 auto 12px; display: block; opacity: .3; }

/* Config list */
.config-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
.config-item:last-child { border-bottom: none; }
.config-item-name { font-size: 14px; }

/* Row actions */
.row-actions { display: flex; gap: 6px; }

/* History table color classes */
.mono { font-family: var(--mono); font-size: 13px; }

.login-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 32px 24px;
}
.login-logo {
  font-size: 40px;
  margin-bottom: 8px;
}
.login-title {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.login-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 32px;
}
.login-box {
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.login-error {
  font-size: 13px;
  color: var(--red);
  text-align: center;
  min-height: 18px;
}

</style>
</head>

  'orlando': '17111994',
  'giulia':  '15051998'
};

function tentarLogin() {
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const err  = document.getElementById('login-error');
  if (USERS[user] && USERS[user] === pass) {
    sessionStorage.setItem('invest_auth', user);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('topbar-sub').textContent = 'Olá, ' + user.charAt(0).toUpperCase() + user.slice(1) + '!';
  } else {
    err.textContent = 'Usuário ou senha incorretos.';
    setTimeout(() => err.textContent = '', 2500);
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') tentarLogin();
});

  const auth = sessionStorage.getItem('invest_auth');
  if (!auth) {
    document.getElementById('login-screen').style.display = 'flex';

    document.getElementById('topbar-sub').textContent = 'Olá, ' + auth.charAt(0).toUpperCase() + auth.slice(1) + '!';

function getInst() { return gs().instituicoes || ['Nubank','XP','Inter']; }
function getLanc() { return gs().lancamentos || []; }
function getMeta() { return parseFloat(gs().meta) || 0; }

function fmtBRL(v) {
  return new Intl.NumberFormat('pt-BR', {style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
}
function fmtBRLDec(v) {
  return new Intl.NumberFormat('pt-BR', {style:'currency',currency:'BRL'}).format(v||0);
}
function fmtPct(v) {
  if (!isFinite(v) || v === null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function getMeses() {
  return [...new Set(getLanc().map(x => x.mes))].sort();
}
function totaisPorMes() {
  const meses = getMeses(), res = {};
  meses.forEach(m => {
    const items = getLanc().filter(x => x.mes === m);
    res[m] = { total: items.reduce((a,b) => a + (b.valor||0), 0), items };
  });
  return res;
}
function destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
}

function switchTab(name) {
  ['dashboard','lancamento','historico','config'].forEach(t => {
    document.getElementById('sec-'+t).classList.toggle('active', t===name);
    document.getElementById('nav-'+t).classList.toggle('active', t===name);
  });
  if (name==='dashboard') renderDashboard();
  else if (name==='lancamento') renderLancamento();
  else if (name==='historico') renderHistorico();
  else if (name==='config') renderConfig();
}

function editarMeta() {
  const s = gs();
  const atual = parseFloat(s.meta) || 0;

  ss(s);
  renderDashboard();
}

function adicionarItem() {
  const mes = document.getElementById('inp-mes')?.value;
  const inst = document.getElementById('inp-inst')?.value;
  const titular = document.getElementById('inp-titular')?.value;
  const valor = parseFloat(document.getElementById('inp-valor')?.value || '0');
  if (!mes || !inst || isNaN(valor) || valor <= 0) { alert('Preencha todos os campos com valores válidos.'); return; }
  const s = gs();
  if (!s.lancamentos) s.lancamentos = [];
  s.lancamentos.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2), mes, instituicao:inst, titular, valor });

  document.getElementById('inp-valor').value = '';
  atualizarTabLanc();
}

function editarItem(id, valorAtual) {
  const novoValor = prompt('Novo valor para este lançamento (R$):', valorAtual.toFixed(2).replace('.',','));
  if (novoValor === null) return;
  const v = parseFloat(novoValor.replace(',','.'));
  if (isNaN(v) || v < 0) { alert('Valor inválido.'); return; }
  const s = gs();
  const item = (s.lancamentos||[]).find(x => x.id === id);
  if (item) { item.valor = v; ss(s); atualizarTabLanc(); }
}

function removerItem(id) {
  if (!confirm('Remover este lançamento?')) return;
  const s = gs();
  s.lancamentos = (s.lancamentos||[]).filter(x => x.id !== id);
  ss(s);
  atualizarTabLanc();
}

let _histView = 'casal'; // 'orlando' | 'giulia' | 'casal'

function renderHistorico() {
  const div = document.getElementById('sec-historico');
  const meses = getMeses(), tm = totaisPorMes();
  if (meses.length === 0) { div.innerHTML = `<div class="empty" style="padding-top:60px">Nenhum lançamento ainda.</div>`; return; }

  const allInst = [...new Set(getLanc().map(x=>x.instituicao))];
  const mesesCasal = meses.filter(m => m >= '2025-09');

  // Qual conjunto de meses usar
  const mesesView = _histView === 'orlando' ? meses : mesesCasal;
  const mesesLabels = mesesView.map(m => { const [a,mo] = m.split('-'); return mo+'/'+a.slice(2); });

  // Montar tabela
  function rowsFor(view) {
    return [...mesesView].reverse().map((m, _, arr) => {
      const origIdx = mesesView.indexOf(m);
      const items = tm[m]?.items || [];
      const isOrlando = x => x.titular==='orlando'||x.titular==='eu';
      const isGiulia  = x => x.titular==='giulia'||x.titular==='esposa';
      const total = view==='orlando' ? items.filter(isOrlando).reduce((a,b)=>a+(b.valor||0),0)
                  : view==='giulia'  ? items.filter(isGiulia).reduce((a,b)=>a+(b.valor||0),0)
                  : items.reduce((a,b)=>a+(b.valor||0),0);
      const mAnt = origIdx > 0 ? mesesView[origIdx-1] : null;
      const itemsAnt = mAnt ? (tm[mAnt]?.items||[]) : [];
      const totalAnt = mAnt ? (view==='orlando' ? itemsAnt.filter(isOrlando).reduce((a,b)=>a+(b.valor||0),0)
                             : view==='giulia'  ? itemsAnt.filter(isGiulia).reduce((a,b)=>a+(b.valor||0),0)
                             : itemsAnt.reduce((a,b)=>a+(b.valor||0),0)) : null;
      const var_ = totalAnt ? ((total-totalAnt)/totalAnt*100) : null;
      return `<tr>
        <td style="font-weight:500;font-size:13px">${m.split('-').reverse().join('/')}</td>
        <td class="mono">${fmtBRLDec(total)}</td>
        <td class="${var_===null?'neutral':var_>=0?'positive':'negative'} mono">${var_===null?'—':fmtPct(var_)}</td>
      </tr>`;
    }).join('');
  }

  const tabStyle = (v) => `padding:8px 14px;font-size:13px;font-weight:500;border:none;background:${_histView===v?'var(--text)':'transparent'};color:${_histView===v?'var(--bg)':'var(--text2)'};border-radius:6px;cursor:pointer;font-family:var(--font)`;
  const chartTabStyle = (v) => `padding:6px 12px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:${_histChart===v?'var(--text)':'transparent'};color:${_histChart===v?'var(--bg)':'var(--text2)'};cursor:pointer;font-family:var(--font)`;

  div.innerHTML = `
    <div style="margin-top:16px"></div>
    <div style="display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;margin-bottom:16px">
      <button style="${tabStyle('orlando')}" onclick="setHistView('orlando')">Orlando</button>
      <button style="${tabStyle('giulia')}"  onclick="setHistView('giulia')">Giulia</button>
      <button style="${tabStyle('casal')}"   onclick="setHistView('casal')">Casal</button>
    </div>

    ${mesesView.length > 1 ? `
    <div class="section-header" style="display:flex;align-items:center;justify-content:space-between">
      Evolução
      <div style="display:flex;gap:6px">
        <button style="${chartTabStyle('total')}" onclick="setHistChart('total')">Total</button>
        <button style="${chartTabStyle('inst')}"  onclick="setHistChart('inst')">Por instituição</button>
      </div>
    </div>
    <div class="card">
      <div class="chart-legend" id="leg-hist"></div>
      <div class="chart-container" style="height:210px"><canvas id="ch-hist" role="img" aria-label="Gráfico de evolução"></canvas></div>
    </div>` : ''}

    <div class="section-header">Resumo mensal</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead><tr><th>Mês</th><th>Total</th><th>Variação</th></tr></thead>
        <tbody>${rowsFor(_histView)}</tbody>
      </table>
    </div>
  `;

  setTimeout(() => buildHistChart(mesesView, mesesLabels, allInst), 60);
}

  buildHistChart(mesesView, mesesLabels, [...new Set(getLanc().map(x=>x.instituicao))]);
}

function toggleInst(k) {
  if (_hiddenInst.has(k)) _hiddenInst.delete(k); else _hiddenInst.add(k);
  destroyChart('hist');
  const mesesView = _histView==='orlando' ? getMeses() : getMeses().filter(m=>m>='2025-09');
  const mesesLabels = mesesView.map(m=>{const[a,mo]=m.split('-');return mo+'/'+a.slice(2);});
  buildHistChart(mesesView, mesesLabels, [...new Set(getLanc().map(x=>x.instituicao))]);
}

function buildHistChart(mesesView, mesesLabels, allInst) {
  const tm = totaisPorMes();
  const isOrlando = x => x.titular==='orlando'||x.titular==='eu';
  const isGiulia  = x => x.titular==='giulia'||x.titular==='esposa';
  const filterFn  = _histView==='orlando' ? isOrlando : _histView==='giulia' ? isGiulia : ()=>true;

  destroyChart('hist');
  const leg = document.getElementById('leg-hist');
  let datasets;

  if (_histChart === 'total') {
    const data = mesesView.map(m => (tm[m]?.items||[]).filter(filterFn).reduce((a,b)=>a+(b.valor||0),0));
    const color = _histView==='giulia' ? '#a78bfa' : _histView==='orlando' ? '#22c55e' : '#3b82f6';
    if (leg) leg.innerHTML = `<span class="legend-item"><span class="legend-dot" style="background:${color}"></span>${_histView==='casal'?'Casal':_histView==='orlando'?'Orlando':'Giulia'}</span>`;
    datasets = [{ label:'Total', data, borderColor:color, backgroundColor:color+'18', fill:true, tension:0.4, pointRadius:3, borderWidth:2 }];
  } else {
    const instFiltradas = _histView==='orlando'
      ? allInst.filter(k => getLanc().some(x=>(x.titular==='orlando'||x.titular==='eu')&&x.instituicao===k))
      : _histView==='giulia'
      ? allInst.filter(k => getLanc().some(x=>(x.titular==='giulia'||x.titular==='esposa')&&x.instituicao===k))
      : allInst;

    if (leg) {
      const allBtn = document.createElement('span');
      allBtn.textContent = _hiddenInst.size === 0 ? 'Desmarcar todos' : 'Marcar todos';
      allBtn.style.cssText = 'cursor:pointer;font-size:11px;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;user-select:none;white-space:nowrap;margin-right:4px';
      allBtn.onclick = () => toggleAllInst(instFiltradas);
      leg.innerHTML = '';
      leg.appendChild(allBtn);
      instFiltradas.forEach((k,i) => {
        const hidden = _hiddenInst.has(k);
        const color = COLORS[i%COLORS.length];
        const span = document.createElement('span');
        span.className = 'legend-item';
        span.style.cssText = 'cursor:pointer;opacity:' + (hidden?'0.3':'1') + ';transition:opacity .15s;user-select:none';
        span.innerHTML = '<span class="legend-dot" style="background:' + (hidden?'var(--text3)':color) + '"></span>' + k;
        span.onclick = () => toggleInst(k);
        leg.appendChild(span);
      });
    }

    datasets = instFiltradas.filter(k => !_hiddenInst.has(k)).map((k,i) => {
      const colorIdx = instFiltradas.indexOf(k);
      const color = COLORS[colorIdx%COLORS.length];
      return {
        label:k,
        data: mesesView.map(m => (tm[m]?.items||[]).filter(x=>filterFn(x)&&x.instituicao===k).reduce((a,b)=>a+(b.valor||0),0)),
        borderColor:color, backgroundColor:color+'22',
        fill:false, tension:0.35, pointRadius:3, borderWidth:2
      };
    });
  }

  _charts['hist'] = new Chart(document.getElementById('ch-hist'), {
    type:'line', data:{labels:mesesLabels,datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmtBRLDec(c.raw)}}},scales:{y:{ticks:{callback:v=>fmtBRL(v),color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}},x:{ticks:{color:'#555',font:{size:10}},grid:{display:false},border:{display:false}}}}
  });
}

/* ---- CONFIG ---- */
function renderConfig() {
  const div = document.getElementById('sec-config');
  const inst = getInst();
  const meta = getMeta();

  div.innerHTML = `
    <div style="margin-top:16px"></div>
    <div class="section-header">Instituições</div>
    <div class="card">
      <div>${inst.map((k,i)=>`<div class="config-item">
        <span class="config-item-name">${k}</span>
        <button class="btn btn-danger btn-sm" onclick="removerInst(${i})">Remover</button>
      </div>`).join('')}</div>
      <div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <input type="text" class="form-input" id="nova-inst" placeholder="Nome da instituição">
        <button class="btn btn-primary" onclick="adicionarInst()" style="white-space:nowrap">+ Add</button>
      </div>
    </div>

    <div class="section-header">Meta patrimonial</div>
    <div class="card">
      <div class="form-group" style="margin-bottom:10px">
        <label class="form-label">Valor da meta (R$)</label>
        <input type="number" class="form-input" id="inp-meta" value="${meta||''}" placeholder="Ex: 500000" min="0" inputmode="decimal">
      </div>
      <button class="btn btn-primary" onclick="salvarMeta()">Salvar meta</button>
    </div>

    <div class="section-header">Backup de dados</div>
    <div class="card">
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Os dados ficam salvos neste dispositivo. Use exportar/importar para fazer backup ou transferir para outro celular.</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn" onclick="exportarDados()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar JSON
        </button>
        <button class="btn" onclick="document.getElementById('imp-file').click()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importar JSON
        </button>
        <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importarDados(this)">
        <button class="btn btn-danger" onclick="limparDados()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Limpar todos os dados
        </button>
      </div>
    </div>
  `;
}

function adicionarInst() {
  const v = document.getElementById('nova-inst')?.value?.trim();
  if (!v) return;
  const s = gs();
  if (!s.instituicoes) s.instituicoes = ['Nubank','XP','Inter'];
  if (s.instituicoes.includes(v)) { alert('Já existe.'); return; }
  s.instituicoes.push(v);
  ss(s); renderConfig();
}
function removerInst(i) {
  const s = gs();
  if (!s.instituicoes) return;
  s.instituicoes.splice(i,1); ss(s); renderConfig();
}
function salvarMeta() {
  const v = parseFloat(document.getElementById('inp-meta')?.value||'0');
  const s = gs(); s.meta = v > 0 ? v : 0; ss(s);
  alert('Meta salva: ' + fmtBRLDec(v));
}
function exportarDados() {
  const blob = new Blob([JSON.stringify(gs(),null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'investimentos_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importarDados(inp) {
  const f = inp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!confirm('Isso vai substituir os dados atuais. Continuar?')) return;
      ss(d); renderConfig(); alert('Importado com sucesso!');
    } catch(err) { alert('Arquivo inválido.'); }
  };
  r.readAsText(f); inp.value='';
}
function limparDados() {
  if (!confirm('Apagar TODOS os dados permanentemente?')) return;
  localStorage.removeItem('invest_v4');
  renderConfig(); alert('Dados apagados.');
}

renderDashboard();
checkAuth();
</script>
</body>
</html>
